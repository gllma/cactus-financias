<!doctype html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cactus Financias</title>
  <style>
    :root {
      --bg: #042f2e;
      --surface: rgba(255,255,255,.92);
      --text: #0f172a;
      --muted: #475569;
      --primary: #0f766e;
      --border: rgba(100,116,139,.35);
    }
    html[data-theme='dark'] {
      --bg: #031b1e;
      --surface: rgba(9,22,42,.85);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --primary: #14b8a6;
      --border: rgba(71,85,105,.45);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .container { max-width: 980px; margin: 0 auto; padding: 16px; position: relative; z-index: 1; }
    body:before, body:after{content:'';position:fixed;border-radius:999px;pointer-events:none;z-index:0}
    body:before{width:540px;height:540px;left:-120px;top:-200px;background:radial-gradient(circle,rgba(45,212,191,.25),transparent 70%)}
    body:after{width:420px;height:420px;right:-90px;bottom:-150px;background:radial-gradient(circle,rgba(59,130,246,.2),transparent 70%)}
    .topbar {
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
      background: linear-gradient(145deg, rgba(5,150,105,.92), rgba(6,78,59,.95)); border: 1px solid rgba(255,255,255,.1); border-radius: 14px; padding: 12px; color:#fff;
    }
    .topbar input, .topbar select { padding: 8px 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,.35); background: rgba(255,255,255,.12); color: #fff; }
    .btn { padding: 8px 12px; border: 0; border-radius: 8px; background: var(--primary); color: #fff; cursor: pointer; }
    .btn.secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .header {
      margin-top: 12px; display: flex; align-items: center; justify-content: space-between;
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px; backdrop-filter: blur(10px);
    }
    .avatar {
      width: 42px; height: 42px; border-radius: 999px; display: flex; align-items: center; justify-content: center;
      background: var(--primary); color: #fff; font-weight: 700;
    }
    nav { margin: 12px 0; }
    nav a {
      text-decoration: none; margin-right: 12px; color: var(--muted); font-weight: 600;
    }
    nav a.active { color: var(--primary); }
    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px;
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(220px,1fr)); gap: 12px; margin-top: 12px; }
    .metric { border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
    .metric .label { color: var(--muted); font-size: 13px; }
    .metric .value { font-size: 24px; font-weight: 700; margin-top: 4px; }
    #msg { margin-top: 10px; color: var(--muted); }
    @media (max-width: 760px) {
      .container { padding: 12px; }
      .header { align-items: flex-start; gap: 8px; }
      nav { display: flex; overflow-x: auto; white-space: nowrap; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="topbar">
      <input id="name" placeholder="Nome" value="Maria Silva"/>
      <input id="email" placeholder="E-mail" value="admin@cactus.com"/>
      <button id="saveSession" class="btn">Salvar sessão</button>
      <button id="toggleTheme" class="btn secondary">Alternar tema</button>
    </header>

    <section class="header">
      <div>
        <div style="font-weight:700">Cactus Financias</div>
        <div id="welcome" style="color:var(--muted);font-size:14px"></div>
      </div>
      <div class="avatar" id="avatar"></div>
    </section>

    <nav>
      <a href="#/spaces" id="link-spaces">Espaços</a>
      <a href="#/profile" id="link-profile">Perfil</a>
      <a href="#/vaults" id="link-vaults">Cofres</a>
      <a href="#/observability" id="link-observability">Observabilidade</a>
    </nav>

    <main id="app"></main>
  </div>

<script>
const API=window.CACTUS_API_BASE_URL || `${location.protocol}//${location.hostname}:8000`;
const state={name:'Maria Silva',email:'admin@cactus.com',theme:'light',token:'',activeSpaceId:null};

function initials(name){return name.trim().split(/\s+/).slice(0,2).map(n=>n[0]?.toUpperCase()||'').join('');}
function applyTheme(){document.documentElement.setAttribute('data-theme', state.theme);}
function hydrateHeader(){
  document.getElementById('welcome').textContent=`Usuário: ${state.name} (${state.email})`;
  document.getElementById('avatar').textContent=initials(state.name);
  document.getElementById('name').value=state.name;
  document.getElementById('email').value=state.email;
}

function loadSession(){
  const raw=localStorage.getItem('cactus_demo_session');
  if(!raw) return;
  try{Object.assign(state,JSON.parse(raw));}catch{}
}

function saveSession(){
  state.name=document.getElementById('name').value;
  state.email=document.getElementById('email').value;
  localStorage.setItem('cactus_demo_session',JSON.stringify(state));
  hydrateHeader();
  render();
}

async function api(path,opts={}){
  const headers=Object.assign({
    'X-User-Email':state.email,
    'X-User-Name':state.name,
    'Content-Type':'application/json',
    ...(state.token?{'Authorization':`Bearer ${state.token}`}:{})
  },opts.headers||{});
  if(state.activeSpaceId){ headers['X-Space-Id']=String(state.activeSpaceId); }
  const r=await fetch(API+path,{...opts,headers});
  const data=await r.json();
  if(!r.ok) throw new Error(data.message||'Erro');
  return data;
}

async function renderLogin(){
  const app=document.getElementById('app');
  app.innerHTML=`
    <section class='card'>
      <h2>Login</h2>
      <p style='color:var(--muted)'>Entre para acessar seus espaços.</p>
      <div style='display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px'>
        <input id='login-name' placeholder='Nome' value='${state.name}' />
        <input id='login-email' placeholder='E-mail' value='${state.email}' />
        <input id='login-pass' type='password' placeholder='Senha' value='123456' />
        <button id='do-login' class='btn'>Entrar</button>
      </div>
      <div id='msg'></div>
    </section>`;

  app.querySelector('#do-login').onclick=async()=>{
    state.name=app.querySelector('#login-name').value;
    state.email=app.querySelector('#login-email').value;
    const password=app.querySelector('#login-pass').value;
    try{
      const res=await api('/api/auth/login',{method:'POST',body:JSON.stringify({email:state.email,name:state.name,password})});
      state.token=res.data.token;
      state.activeSpaceId=res.data.active_space_id;
      saveSession();
      location.hash='#/spaces';
    }catch(e){ app.querySelector('#msg').textContent=e.message; }
  };
}

async function renderSpaces(){
  const app=document.getElementById('app');
  app.innerHTML=`
    <section class='card'>
      <h2>Gerenciamento de Espaços</h2>
      <div style='display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px'>
        <input id='space-name' placeholder='Nome do espaço' />
        <button id='create-space' class='btn'>Criar espaço</button>
      </div>
      <div id='spaces-list'></div>
      <div id='msg'></div>
    </section>`;

  const list=app.querySelector('#spaces-list');
  const msg=app.querySelector('#msg');
  async function loadSpaces(){
    try{
      const res=await api('/api/spaces');
      const spaces=res.data||[];
      list.innerHTML=spaces.map((s)=>`
        <div style='padding:10px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px'>
          <b>${s.name}</b> · ${s.role} · ${s.membership_status}
          <div style='display:flex;gap:8px;flex-wrap:wrap;margin-top:8px'>
            <button class='btn secondary activate-space' data-id='${s.id}'>Ativar</button>
            <input class='invite-email' data-id='${s.id}' placeholder='Convidar por e-mail' />
            <button class='btn invite-space' data-id='${s.id}'>Convidar</button>
          </div>
        </div>`).join('') || "<p style='color:var(--muted)'>Sem espaços.</p>";

      list.querySelectorAll('.activate-space').forEach((b)=>b.onclick=async()=>{
        const id=Number(b.dataset.id);
        await api('/api/auth/switch-space',{method:'POST',body:JSON.stringify({space_id:id})});
        state.activeSpaceId=id; saveSession(); msg.textContent='Espaço ativo atualizado.';
      });
      list.querySelectorAll('.invite-space').forEach((b)=>b.onclick=async()=>{
        const id=Number(b.dataset.id);
        const email=list.querySelector(`.invite-email[data-id="${id}"]`).value;
        await api(`/api/spaces/${id}/invite`,{method:'POST',body:JSON.stringify({email,role:'member'})});
        msg.textContent='Convite enviado.';
      });
    }catch(e){ msg.textContent=e.message; }
  }

  app.querySelector('#create-space').onclick=async()=>{
    try{
      const name=app.querySelector('#space-name').value;
      const res=await api('/api/spaces',{method:'POST',body:JSON.stringify({name})});
      state.activeSpaceId=res.data.id; saveSession();
      await loadSpaces();
      msg.textContent='Espaço criado.';
    }catch(e){ msg.textContent=e.message; }
  };

  await loadSpaces();
}

async function renderProfile(){
  const app=document.getElementById('app');
  try{const res=await api('/api/profile/theme');state.theme=res.data.theme;applyTheme();}catch{}

  app.innerHTML=`
    <section class='card'>
      <h2>Preferências de Perfil</h2>
      <p style='color:var(--muted)'>Persistência de tema por usuário com backend.</p>
      <div style='display:flex;gap:8px'>
        <button class='btn' id='light'>Tema Claro</button>
        <button class='btn secondary' id='dark'>Tema Escuro</button>
      </div>
      <div id='msg'>Tema atual: <b>${state.theme}</b></div>
    </section>`;

  app.querySelector('#light').onclick=()=>setTheme('light');
  app.querySelector('#dark').onclick=()=>setTheme('dark');
}

async function setTheme(theme){
  try{
    const res=await api('/api/profile/theme',{method:'PATCH',body:JSON.stringify({theme})});
    state.theme=res.data.theme;
    localStorage.setItem('cactus_demo_session',JSON.stringify(state));
    applyTheme();
    renderProfile();
  }catch(e){
    document.getElementById('msg').textContent=e.message;
  }
}

async function renderObs(){
  const app=document.getElementById('app');
  app.innerHTML=`
    <section class='card'>
      <h2>Painel de Observabilidade</h2>
      <div style='display:flex;gap:8px;align-items:center'>
        <label>Janela(min): <input id='period' type='number' min='5' max='1440' value='60' style='width:90px'/></label>
        <button id='load' class='btn'>Atualizar resumo</button>
      </div>
      <div class='grid' id='metrics'></div>
      <div id='msg' style='margin-top:8px'></div>
    </section>`;

  app.querySelector('#load').onclick=async()=>{
    const p=app.querySelector('#period').value;
    try{
      const res=await api('/api/infra/observability/summary?period_minutes='+p);
      const metrics=app.querySelector('#metrics');
      metrics.innerHTML=`
        <div class='metric'><div class='label'>Falhas em jobs</div><div class='value'>${res.data.failed_jobs}</div></div>
        <div class='metric'><div class='label'>Jobs pendentes</div><div class='value'>${res.data.pending_jobs}</div></div>
        <div class='metric'><div class='label'>Exceções recentes</div><div class='value'>${res.data.recent_exceptions}</div></div>
        <div class='metric'><div class='label'>Usuários totais</div><div class='value'>${res.data.total_users}</div></div>
        <div class='metric'><div class='label'>Usuários em tema escuro</div><div class='value'>${res.data.dark_theme_users}</div></div>
        <div class='metric'><div class='label'>Uptime simulado</div><div class='value'>${res.data.simulated_uptime_percent}%</div></div>`;
      app.querySelector('#msg').textContent=`Gerado em: ${res.meta.generated_at}`;
    }catch(e){
      app.querySelector('#metrics').innerHTML='';
      app.querySelector('#msg').textContent=e.message;
    }
  };

  app.querySelector('#load').click();
}

async function renderVaults(){
  const app=document.getElementById('app');
  app.innerHTML=`
    <section class='card'>
      <h2>Cofres e Movimentações</h2>
      <p style='color:var(--muted)'>Crie cofres para metas e registre entradas/saídas.</p>

      <div style='display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px'>
        <input id='vault-name' placeholder='Nome do cofre (ex.: Viagem)' />
        <input id='vault-target' type='number' min='0' step='0.01' placeholder='Meta (opcional)' />
        <button id='create-vault' class='btn'>Criar cofre</button>
      </div>

      <div id='vault-insights' class='grid' style='margin-bottom:10px'></div>
      <div id='vault-list' style='display:grid;gap:8px;margin-bottom:12px'></div>
      <div id='vault-ops'></div>
      <div id='msg'></div>
    </section>`;

  const vaultInsights=app.querySelector('#vault-insights');
  const vaultList=app.querySelector('#vault-list');
  const vaultOps=app.querySelector('#vault-ops');
  const msg=app.querySelector('#msg');

  async function loadInsights(){
    const res=await api('/api/vaults/insights');
    const i=res.data;
    vaultInsights.innerHTML=`
      <div class='metric'><div class='label'>Saldo total</div><div class='value'>R$ ${Number(i.total_balance).toFixed(2)}</div></div>
      <div class='metric'><div class='label'>Meta total</div><div class='value'>R$ ${Number(i.total_target).toFixed(2)}</div></div>
      <div class='metric'><div class='label'>Progresso</div><div class='value'>${Number(i.progress_percent).toFixed(1)}%</div></div>
      <div class='metric'><div class='label'>Fluxo do mês</div><div class='value'>R$ ${Number(i.monthly_net).toFixed(2)}</div></div>`;
  }

  async function loadVaults(selectedId=null){
    try{
      const res=await api('/api/vaults');
      const vaults=res.data||[];
      if(!vaults.length){
        vaultList.innerHTML="<div style='color:var(--muted)'>Nenhum cofre criado ainda.</div>";
        vaultOps.innerHTML='';
        return;
      }

      vaultList.innerHTML=vaults.map((v)=>`
        <button class='btn secondary vault-item' data-id='${v.id}' style='text-align:left'>
          <b>${v.name}</b> · Saldo: R$ ${Number(v.balance).toFixed(2)} · Meta: R$ ${Number(v.target_amount||0).toFixed(2)}
        </button>`).join('');

      const activeId=selectedId||vaults[0].id;
      vaultList.querySelectorAll('.vault-item').forEach((btn)=>{
        btn.onclick=()=>loadTransactions(btn.dataset.id);
      });
      await loadTransactions(activeId);
    }catch(e){
      msg.textContent=e.message;
    }
  }

  async function loadTransactions(vaultId){
    try{
      const res=await api(`/api/vaults/${vaultId}/transactions`);
      const vault=res.data.vault;
      const txs=res.data.transactions||[];
      vaultOps.innerHTML=`
        <div style='padding:12px;border:1px solid var(--border);border-radius:10px'>
          <h3 style='margin-top:0'>${vault.name}</h3>
          <p style='color:var(--muted)'>Saldo atual: <b>R$ ${Number(vault.balance).toFixed(2)}</b></p>
          <div style='display:flex;gap:8px;flex-wrap:wrap'>
            <select id='tx-type'>
              <option value='deposit'>Depósito</option>
              <option value='withdraw'>Saque</option>
            </select>
            <select id='tx-category'>
              <option value='geral'>Geral</option>
              <option value='reserva'>Reserva</option>
              <option value='lazer'>Lazer</option>
              <option value='moradia'>Moradia</option>
              <option value='investimento'>Investimento</option>
            </select>
            <input id='tx-amount' type='number' min='0.01' step='0.01' placeholder='Valor' />
            <input id='tx-description' placeholder='Descrição (opcional)' />
            <button id='add-tx' class='btn'>Registrar</button>
          </div>
          <div style='margin-top:10px'>
            ${txs.length ? txs.map((t)=>`<div style='padding:8px 0;border-bottom:1px solid var(--border)'>${t.type==='deposit'?'⬆️ Depósito':'⬇️ Saque'} · R$ ${Number(t.amount).toFixed(2)} ${t.category?`· ${t.category}`:''} ${t.description?`· ${t.description}`:''}</div>`).join('') : "<div style='color:var(--muted)'>Sem movimentações.</div>"}
          </div>
        </div>`;

      vaultOps.querySelector('#add-tx').onclick=async()=>{
        const type=vaultOps.querySelector('#tx-type').value;
        const category=vaultOps.querySelector('#tx-category').value;
        const amount=Number(vaultOps.querySelector('#tx-amount').value);
        const description=vaultOps.querySelector('#tx-description').value;
        try{
          await api(`/api/vaults/${vaultId}/transactions`,{
            method:'POST',
            body:JSON.stringify({type,category,amount,description})
          });
          msg.textContent='Movimentação registrada com sucesso.';
          await loadInsights();
          await loadVaults(vaultId);
        }catch(e){
          msg.textContent=e.message;
        }
      };
    }catch(e){
      msg.textContent=e.message;
    }
  }

  app.querySelector('#create-vault').onclick=async()=>{
    const name=app.querySelector('#vault-name').value;
    const targetAmount=Number(app.querySelector('#vault-target').value||0);
    try{
      const res=await api('/api/vaults',{method:'POST',body:JSON.stringify({name,target_amount:targetAmount})});
      app.querySelector('#vault-name').value='';
      app.querySelector('#vault-target').value='';
      msg.textContent='Cofre criado com sucesso.';
      await loadInsights();
      await loadVaults(res.data.id);
    }catch(e){
      msg.textContent=e.message;
    }
  };

  await loadInsights();
  await loadVaults();
}

function activateNav(hash){
  document.getElementById('link-spaces').classList.toggle('active', hash === '#/spaces');
  document.getElementById('link-profile').classList.toggle('active', hash === '#/profile');
  document.getElementById('link-vaults').classList.toggle('active', hash === '#/vaults');
  document.getElementById('link-observability').classList.toggle('active', hash === '#/observability');
}

function route(){
  const h=location.hash|| (state.token ? '#/spaces' : '#/login');
  if(!state.token && h!=='#/login'){ location.hash='#/login'; return; }
  activateNav(h);
  if(h==='#/login') renderLogin();
  else if(h==='#/spaces') renderSpaces();
  else if(h==='#/observability') renderObs();
  else if(h==='#/vaults') renderVaults();
  else renderProfile();
}

document.getElementById('saveSession').onclick=saveSession;
document.getElementById('toggleTheme').onclick=()=>setTheme(state.theme==='light'?'dark':'light');
window.addEventListener('hashchange',route);

loadSession();
hydrateHeader();
applyTheme();
route();
</script>
</body>
</html>
